{% extends 'admin_panel/base_admin.html' %}
{% block title %}Add Theatre — Admin{% endblock %}
{% block admin_content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h2 style="font-family:var(--font-display);letter-spacing:2px">{{ action|upper }} THEATRE</h2>
  <a href="{% url 'admin_panel:theatre_list' %}" class="btn btn-outline-light"><i class="bi bi-arrow-left"></i> Back</a>
</div>
<div class="admin-table-wrap p-4" style="max-width:600px">
  <form method="post">{% csrf_token %}
    <div class="mb-3"><label class="form-label">Theatre Name</label><input type="text" name="name" class="form-control" placeholder="e.g. PVR Cinemas" required></div>
    <div class="mb-3"><label class="form-label">Location / Address</label><input type="text" name="location" class="form-control" placeholder="Full address" required></div>
    <div class="mb-4"><label class="form-label">City</label><input type="text" name="city" class="form-control" placeholder="e.g. Hyderabad" required></div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary"><i class="bi bi-check-circle"></i> Save</button>
      <a href="{% url 'admin_panel:theatre_list' %}" class="btn btn-outline-light">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
