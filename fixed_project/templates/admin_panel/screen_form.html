{% extends 'admin_panel/base_admin.html' %}
{% block title %}Add Screen — Admin{% endblock %}
{% block admin_content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h2 style="font-family:var(--font-display);letter-spacing:2px">ADD SCREEN</h2>
  <a href="{% url 'admin_panel:theatre_list' %}" class="btn btn-outline-light"><i class="bi bi-arrow-left"></i> Back</a>
</div>
<div class="admin-table-wrap p-4" style="max-width:600px">
  <div class="mb-4 p-3 rounded-xl" style="background:rgba(245,197,24,.07);border:1px solid rgba(245,197,24,.2)">
    <div style="font-size:.8rem;color:var(--accent-gold)">Theatre: {{ theatre.name }}</div>
  </div>
  <form method="post">{% csrf_token %}
    <div class="mb-3"><label class="form-label">Screen Name</label><input type="text" name="name" class="form-control" placeholder="e.g. Screen 1, Audi 2" required></div>
    <div class="row g-3 mb-4">
      <div class="col-6"><label class="form-label">Total Rows</label><input type="number" name="total_rows" class="form-control" value="8" min="1" max="20"></div>
      <div class="col-6"><label class="form-label">Seats Per Row</label><input type="number" name="seats_per_row" class="form-control" value="10" min="1" max="30"></div>
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary"><i class="bi bi-check-circle"></i> Save Screen</button>
      <a href="{% url 'admin_panel:theatre_list' %}" class="btn btn-outline-light">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
