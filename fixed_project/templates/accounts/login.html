{% extends 'base.html' %}
{% block title %}Login — CinéAI{% endblock %}
{% block content %}
<div class="container">
  <div class="auth-card">
    <div class="auth-logo">🎬 CINÉAI</div>
    <h4 style="font-family:var(--font-display);letter-spacing:1px;margin-bottom:6px">WELCOME BACK</h4>
    <p class="text-muted small mb-4">Sign in to book your next movie experience</p>

    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2">
        <i class="bi bi-box-arrow-in-right"></i> Sign In
      </button>
    </form>

    <hr style="border-color:var(--border);margin:24px 0">
    <p class="text-center text-muted small">
      New to CinéAI?
      <a href="{% url 'accounts:register' %}" class="text-gold">Create an account</a>
    </p>

    <!-- Demo credentials hint -->
    <div class="mt-3 p-3 rounded-xl" style="background:rgba(245,197,24,.06);border:1px solid rgba(245,197,24,.2);font-size:.8rem">
      <div class="text-gold mb-1" style="font-size:.72rem;text-transform:uppercase;letter-spacing:1px">Demo Accounts</div>
      <div class="text-muted">User: <code>demo / demo123</code></div>
      <div class="text-muted">Admin: <code>admin / admin123</code></div>
    </div>
  </div>
</div>
{% endblock %}
