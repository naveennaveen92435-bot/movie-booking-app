{% extends 'base.html' %}
{% block title %}Register — CinéAI{% endblock %}
{% block content %}
<div class="container">
  <div class="auth-card">
    <div class="auth-logo">🎬 CINÉAI</div>
    <h4 style="font-family:var(--font-display);letter-spacing:1px;margin-bottom:6px">CREATE ACCOUNT</h4>
    <p class="text-muted small mb-4">Join CinéAI for personalized movie booking</p>

    <form method="post">
      {% csrf_token %}
      <div class="row g-3">
        <div class="col-12">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control" placeholder="Choose a username" required autofocus>
        </div>
        <div class="col-12">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" placeholder="your@email.com" required>
        </div>
        <div class="col-12">
          <label class="form-label">Phone</label>
          <input type="text" name="phone" class="form-control" placeholder="+91 9876543210">
        </div>
        <div class="col-6">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" placeholder="Min 6 chars" required>
        </div>
        <div class="col-6">
          <label class="form-label">Confirm Password</label>
          <input type="password" name="confirm_password" class="form-control" placeholder="Repeat password" required>
        </div>
        <div class="col-12">
          <button type="submit" class="btn btn-primary w-100 py-2">
            <i class="bi bi-person-plus"></i> Create Account
          </button>
        </div>
      </div>
    </form>

    <hr style="border-color:var(--border);margin:24px 0">
    <p class="text-center text-muted small">
      Already have an account?
      <a href="{% url 'accounts:login' %}" class="text-gold">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
